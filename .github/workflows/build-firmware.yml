name: build-firmware

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      test_only:
        description: "Skip package download and firmware compile"
        required: false
        default: false
        type: boolean
      assemble_imagebuilder:
        description: "Build same-baseline ImageBuilder preload images"
        required: false
        default: true
        type: boolean

permissions:
  actions: read
  contents: read

jobs:
  build:
    name: ${{ matrix.profile }}
    runs-on: ubuntu-24.04
    timeout-minutes: 355
    strategy:
      fail-fast: false
      matrix:
        profile:
          - IPQ60XX-NOWIFI
          - IPQ60XX-WIFI

    steps:
      - name: Checkout buildkit
        uses: actions/checkout@v4

      - name: Export baseline env
        run: |
          chmod +x ./ci/*.sh
          ./ci/compute_baseline_key.sh >> "$GITHUB_ENV"

      - name: Resolve prebuilt artifact
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.test_only) }}
        id: prebuilt
        uses: actions/github-script@v7
        env:
          BASELINE_ARTIFACT_NAME: ${{ env.BASELINE_ARTIFACT_NAME }}
        with:
          script: |
            const artifactName = process.env.BASELINE_ARTIFACT_NAME;
            const { owner, repo } = context.repo;
            const artifacts = await github.paginate(
              github.rest.actions.listArtifactsForRepo,
              { owner, repo, per_page: 100 }
            );
            const matches = artifacts
              .filter((artifact) => artifact.name === artifactName && !artifact.expired)
              .sort((left, right) => Date.parse(right.created_at) - Date.parse(left.created_at));

            if (!matches.length) {
              core.setFailed(
                `Missing prebuilt artifact ${artifactName}. Run the "prebuild-package-stack" workflow first for this baseline.`
              );
              return;
            }

            const artifact = matches[0];
            if (!artifact.workflow_run || !artifact.workflow_run.id) {
              core.setFailed(
                `Artifact ${artifactName} is missing workflow metadata, cannot download it safely.`
              );
              return;
            }

            core.info(
              `Using prebuilt artifact ${artifact.name} from run ${artifact.workflow_run.id}.`
            );
            core.setOutput("artifact-name", artifact.name);
            core.setOutput("run-id", String(artifact.workflow_run.id));

      - name: Download prebuilt artifact
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.test_only) }}
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ steps.prebuilt.outputs.run-id }}
          name: ${{ steps.prebuilt.outputs.artifact-name }}
          path: .artifacts/prebuilt

      - name: Free disk space
        uses: endersonmenezes/free-disk-space@v2
        with:
          remove_android: true
          remove_dotnet: true
          remove_haskell: true
          remove_tool_cache: true
          remove_swap: true
          remove_packages: "azure-cli google-cloud-cli microsoft-edge-stable google-chrome-stable firefox postgresql* temurin-* *llvm* mysql* dotnet-sdk-*"
          remove_packages_one_command: true
          remove_folders: "/usr/share/swift /usr/share/miniconda /usr/share/az* /usr/share/glade* /usr/local/share/chromium /usr/local/share/powershell"
          testing: false

      - name: Install bootstrap tools
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo -E apt -yqq update
          sudo -E apt -yqq install bc dos2unix git jq zstd

      - name: Build firmware
        env:
          PROFILE: ${{ matrix.profile }}
          TEST_ONLY: ${{ inputs.test_only && 'true' || 'false' }}
          ASSEMBLE_IMAGEBUILDER: ${{ github.event_name == 'push' && 'true' || (inputs.assemble_imagebuilder && 'true' || 'false') }}
          USE_PREBUILT_STACK: ${{ github.event_name == 'workflow_dispatch' && inputs.test_only && 'false' || 'true' }}
          PREBUILT_STACK_DIR: ${{ github.workspace }}/.artifacts/prebuilt
          PREBUILT_ARTIFACT_NAME: ${{ env.BASELINE_ARTIFACT_NAME }}
        run: |
          chmod +x ./ci/*.sh
          ./ci/build_firmware.sh

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.profile }}
          path: dist/out/${{ matrix.profile }}
          if-no-files-found: warn
