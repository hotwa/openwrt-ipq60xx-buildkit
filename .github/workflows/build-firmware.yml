name: build-firmware

on:
  workflow_run:
    workflows:
      - prebuild-package-stack
    types:
      - completed
  workflow_dispatch:
    inputs:
      test_only:
        description: "Skip package download and firmware compile"
        required: false
        default: false
        type: boolean
      assemble_imagebuilder:
        description: "Build same-baseline ImageBuilder preload images"
        required: false
        default: true
        type: boolean

permissions:
  actions: read
  contents: read

jobs:
  build:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    name: ${{ matrix.profile }}
    runs-on: ubuntu-24.04
    timeout-minutes: 355
    strategy:
      fail-fast: false
      matrix:
        profile:
          - IPQ60XX-NOWIFI
          - IPQ60XX-WIFI

    steps:
      - name: Checkout buildkit
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Export baseline env
        run: |
          chmod +x ./ci/*.sh
          ./ci/compute_baseline_key.sh >> "$GITHUB_ENV"

      - name: Resolve prebuilt artifact
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.test_only) }}
        id: prebuilt
        uses: actions/github-script@v8
        env:
          BASELINE_ARTIFACT_NAME: ${{ env.BASELINE_ARTIFACT_NAME }}
          TRIGGER_RUN_ID: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.id || '' }}
        with:
          script: |
            const artifactName = process.env.BASELINE_ARTIFACT_NAME;
            const triggerRunId = process.env.TRIGGER_RUN_ID;
            const { owner, repo } = context.repo;
            let matches = [];

            if (triggerRunId) {
              const artifacts = await github.paginate(
                github.rest.actions.listWorkflowRunArtifacts,
                { owner, repo, run_id: Number(triggerRunId), per_page: 100 }
              );
              matches = artifacts
                .filter((artifact) => artifact.name === artifactName && !artifact.expired)
                .sort((left, right) => Date.parse(right.created_at) - Date.parse(left.created_at));
              if (!matches.length) {
                core.setFailed(
                  `Missing prebuilt artifact ${artifactName} in prebuild run ${triggerRunId}. Re-run the "prebuild-package-stack" workflow first.`
                );
                return;
              }
            } else {
              const artifacts = await github.paginate(
                github.rest.actions.listArtifactsForRepo,
                { owner, repo, per_page: 100 }
              );
              matches = artifacts
                .filter((artifact) => artifact.name === artifactName && !artifact.expired)
                .sort((left, right) => Date.parse(right.created_at) - Date.parse(left.created_at));
            }

            if (!matches.length) {
              core.setFailed(
                `Missing prebuilt artifact ${artifactName}. Run the "prebuild-package-stack" workflow first for this baseline.`
              );
              return;
            }

            const artifact = matches[0];
            const resolvedRunId = String(triggerRunId || artifact.workflow_run?.id || "");
            if (!resolvedRunId) {
              core.setFailed(
                `Artifact ${artifactName} is missing workflow metadata, cannot download it safely.`
              );
              return;
            }

            core.info(
              `Using prebuilt artifact ${artifact.name} from run ${resolvedRunId}.`
            );
            core.setOutput("artifact-name", artifact.name);
            core.setOutput("run-id", resolvedRunId);

      - name: Download prebuilt artifact
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.test_only) }}
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ steps.prebuilt.outputs.run-id }}
          name: ${{ steps.prebuilt.outputs.artifact-name }}
          path: .artifacts/prebuilt

      - name: Free disk space
        uses: endersonmenezes/free-disk-space@v2
        with:
          remove_android: true
          remove_dotnet: true
          remove_haskell: true
          remove_tool_cache: true
          remove_swap: true
          remove_packages: "azure-cli google-cloud-cli microsoft-edge-stable google-chrome-stable firefox postgresql* temurin-* *llvm* mysql* dotnet-sdk-*"
          remove_packages_one_command: true
          remove_folders: "/usr/share/swift /usr/share/miniconda /usr/share/az* /usr/share/glade* /usr/local/share/chromium /usr/local/share/powershell"
          testing: false

      - name: Install bootstrap tools
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo -E apt -yqq update
          sudo -E apt -yqq install bc dos2unix git jq zstd

      - name: Build firmware
        env:
          PROFILE: ${{ matrix.profile }}
          TEST_ONLY: ${{ github.event_name == 'workflow_dispatch' && inputs.test_only && 'true' || 'false' }}
          ASSEMBLE_IMAGEBUILDER: ${{ github.event_name == 'workflow_dispatch' && (inputs.assemble_imagebuilder && 'true' || 'false') || 'true' }}
          USE_PREBUILT_STACK: ${{ github.event_name == 'workflow_dispatch' && inputs.test_only && 'false' || 'true' }}
          PREBUILT_STACK_DIR: ${{ github.workspace }}/.artifacts/prebuilt
          PREBUILT_ARTIFACT_NAME: ${{ env.BASELINE_ARTIFACT_NAME }}
        run: |
          chmod +x ./ci/*.sh
          ./ci/build_firmware.sh

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.profile }}
          path: dist/out/${{ matrix.profile }}
          if-no-files-found: warn
